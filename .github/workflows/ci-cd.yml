name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# UPDATED:
# Default permission dibuat minimal.
# Job image akan override permissions menjadi packages: write untuk push ke GHCR.
permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # UPDATED:
    # Saat ini hanya memakai 2 env Supabase.
    # Pastikan sudah dibuat di GitHub:
    # Settings > Secrets and variables > Actions > Repository secrets
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

  image:
    name: Build Docker Image and Push to GHCR

    # UPDATED:
    # Image hanya dibuat dan dipush saat push ke branch main.
    # Pull request hanya menjalankan job verify.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # UPDATED:
    # packages: write dibutuhkan untuk push image ke GitHub Container Registry.
    permissions:
      contents: read
      packages: write

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image coordinates
        id: coordinates
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.coordinates.outputs.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=main
            type=raw,value=production

      - name: Build Docker image and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true

          # UPDATED:
          # Image akan dipush sebagai:
          # ghcr.io/owner/repository:<commit-sha>
          # ghcr.io/owner/repository:main
          # ghcr.io/owner/repository:production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # UPDATED:
          # NEXT_PUBLIC_* milik Next.js harus tersedia saat docker build,
          # karena akan masuk ke hasil build frontend.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

          # UPDATED:
          # Cache Docker layer agar build berikutnya lebih cepat.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # REMOVED:
  # Job deploy via SSH dihapus karena skenario saat ini berhenti sampai:
  # Build Docker Image -> Push ke GHCR.