name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

  image:
    name: Build and Push Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.coordinates.outputs.image }}
      tag: ${{ steps.coordinates.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image coordinates
        id: coordinates
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.coordinates.outputs.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=production

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$PROD_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Pull and restart production
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          APP_IMAGE: ${{ needs.image.outputs.image }}
          APP_TAG: ${{ needs.image.outputs.tag }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?PROD_HOST is required}"
          : "${PROD_USER:?PROD_USER is required}"
          : "${PROD_PORT:?PROD_PORT is required}"
          : "${PROD_APP_DIR:?PROD_APP_DIR is required}"

          encode() {
            printf '%s' "$1" | base64 -w 0
          }

          PROD_APP_DIR_B64="$(encode "$PROD_APP_DIR")"
          APP_IMAGE_B64="$(encode "$APP_IMAGE")"
          APP_TAG_B64="$(encode "$APP_TAG")"
          SUPABASE_URL_B64="$(encode "$NEXT_PUBLIC_SUPABASE_URL")"
          SUPABASE_KEY_B64="$(encode "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY")"

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p "$PROD_PORT" \
            "$PROD_USER@$PROD_HOST" \
            "PROD_APP_DIR_B64='$PROD_APP_DIR_B64' APP_IMAGE_B64='$APP_IMAGE_B64' APP_TAG_B64='$APP_TAG_B64' SUPABASE_URL_B64='$SUPABASE_URL_B64' SUPABASE_KEY_B64='$SUPABASE_KEY_B64' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          decode() {
            printf '%s' "$1" | base64 -d
          }

          PROD_APP_DIR="$(decode "$PROD_APP_DIR_B64")"
          export APP_IMAGE="$(decode "$APP_IMAGE_B64")"
          export APP_TAG="$(decode "$APP_TAG_B64")"
          export NEXT_PUBLIC_SUPABASE_URL="$(decode "$SUPABASE_URL_B64")"
          export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$(decode "$SUPABASE_KEY_B64")"

          cd "$PROD_APP_DIR"
          docker compose -f docker-compose.production.yml config --quiet
          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d --remove-orphans
          docker compose -f docker-compose.production.yml ps
          REMOTE_SCRIPT

      - name: Smoke test production
        shell: bash
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          set -euo pipefail
          : "${PROD_URL:?PROD_URL is required}"
          PROD_URL="${PROD_URL%/}"
          curl --fail --show-error --silent --retry 10 --retry-delay 5 "$PROD_URL/"
          curl --fail --show-error --silent --retry 10 --retry-delay 5 "$PROD_URL/katalog"
