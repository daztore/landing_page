name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# UPDATED:
# Default permission dibuat minimal.
# Job image akan override permissions menjadi packages: write untuk push ke GHCR.
permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # UPDATED:
    # Build memakai public site URL dan 2 env Supabase public.
    # Pastikan sudah dibuat di GitHub:
    # Settings > Secrets and variables > Actions > Repository secrets
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://daztore.web.id' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

  image:
    name: Build Docker Image and Push to GHCR

    # UPDATED:
    # Image hanya dibuat dan dipush saat push ke branch main.
    # Pull request hanya menjalankan job verify.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # UPDATED:
    # packages: write dibutuhkan untuk push image ke GitHub Container Registry.
    permissions:
      contents: read
      packages: write

    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://daztore.web.id' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set image coordinates
        id: coordinates
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.coordinates.outputs.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=main
            type=raw,value=production

      - name: Build Docker image and push to GHCR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true

          # UPDATED:
          # Image akan dipush sebagai:
          # ghcr.io/owner/repository:<commit-sha>
          # ghcr.io/owner/repository:main
          # ghcr.io/owner/repository:production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # UPDATED:
          # NEXT_PUBLIC_* milik Next.js harus tersedia saat docker build,
          # karena akan masuk ke hasil build frontend.
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          # UPDATED:
          # Cache Docker layer agar build berikutnya lebih cepat.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # REMOVED:
  # Job deploy via SSH dihapus karena skenario saat ini berhenti sampai:
  # Build Docker Image -> Push ke GHCR.
