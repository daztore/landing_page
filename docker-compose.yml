services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daztore-app
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - daztore
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    image: nginx:1.30.1-alpine
    container_name: daztore-nginx
    depends_on:
      - app
    ports:
      - "8002:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - daztore
    restart: unless-stopped

networks:
  daztore:
    driver: bridge
